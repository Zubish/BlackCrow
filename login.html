<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlackCrow Escrow</title>
    <link rel="icon" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="brand-block auth-brand">
            <img src="images/logo.png" alt="BlackCrow Logo" class="brand-logo">
            <div>
                <h1>BlackCrow</h1>
                <p class="eyebrow">Secure Escrow Login</p>
            </div>
        </div>
        <form class="auth-form">
            <h2>Log In</h2>
            <div class="auth-form-grid">
                <div class="auth-form-panel">
                    <div class="form-group">
                        <label for="login-identifier">Email, Phone, or Username</label>
                        <input type="text" id="login-identifier" name="identifier" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" required>
                    </div>
                    <a href="user.html" class="primary-button">Log In</a>
                </div>
                <div class="auth-divider-vertical"><span>or</span></div>
                <div class="auth-side-panel">
                    <div class="social-buttons">
                        <button type="button" class="social-button google">
                            <span class="social-icon google-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
                                    <path fill="#4285F4" d="M21.35 11.1h-9.7v2.95h5.55c-.24 1.2-.95 2.23-2.03 2.92v2.42h3.28c1.92-1.77 3.04-4.37 3.04-7.34 0-.64-.06-1.26-.14-1.84z"/>
                                    <path fill="#34A853" d="M11.65 22c2.75 0 5.06-.9 6.75-2.45l-3.28-2.42c-.9.6-2.05.95-3.47.95-2.66 0-4.92-1.8-5.73-4.2H2.5v2.63C4.19 19.8 7.66 22 11.65 22z"/>
                                    <path fill="#FBBC05" d="M5.92 13.88c-.2-.6-.32-1.24-.32-1.88s.12-1.28.32-1.88V7.5H2.5A9.93 9.93 0 0 0 1 12c0 1.6.38 3.1 1.05 4.5l3.27-2.62z"/>
                                    <path fill="#EA4335" d="M11.65 5.1c1.5 0 2.85.52 3.92 1.53l2.94-2.94C16.7 2.14 14.4 1 11.65 1 7.66 1 4.19 3.2 2.5 6.5l3.42 2.63c.81-2.4 3.07-4.2 5.73-4.2z"/>
                                </svg>
                            </span>
                            Continue with Google
                        </button>
                        <button type="button" class="social-button apple">
                            <span class="social-icon apple-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
                                    <path fill="currentColor" d="M16.41 7.1c-.2-.25-.43-.5-.7-.7-.5-.38-1-.6-1.4-.7-.3-.05-.7-.08-1.1-.08-.5 0-1 .1-1.5.3-.7.3-1.4.8-1.9 1.5-.4.5-.8 1.1-1 1.7-.2.6-.3 1.2-.2 1.7.1.6.3 1.2.8 1.6.5.4 1.1.6 1.7.6.4 0 .8-.1 1.2-.3.3-.1.6-.25.9-.45.2-.1.4-.2.6-.35.3-.2.5-.4.7-.65.3-.35.4-.75.4-1.2 0-.4-.1-.8-.3-1.2-.2-.33-.4-.62-.7-.85zM12 2.5c-1.7 0-3.1.7-4.2 1.8-1.2 1.2-1.9 2.8-1.9 4.6 0 1.4.3 2.7.9 3.8.4.7.9 1.3 1.6 1.8.2.2.4.4.6.6.4.35.8.62 1.3.8.5.2 1.1.3 1.7.3.7 0 1.5-.1 2.2-.4.8-.3 1.5-.8 2.1-1.4.6-.6 1.1-1.3 1.4-2.1.2-.5.3-1 .3-1.5 0-.5-.1-1-.3-1.5-.2-.7-.5-1.4-.9-2-.3-.5-.7-1-1.1-1.4-.2-.2-.4-.4-.7-.6-.6-.4-1.4-.7-2.2-.7z"/>
                                </svg>
                            </span>
                            Continue with Apple
                        </button>
                        <button type="button" class="social-button email">
                            <span class="social-icon email-icon" aria-hidden="true">@</span>
                            Continue with Email
                        </button>
                    </div>
                </div>
            </div>
            <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </form>
    </div>
</body>
</html>
