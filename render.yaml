services:
  - type: web
    name: blackcrow
    runtime: node
    plan: starter
    buildCommand: npm install && npm run check
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: PUBLIC_APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: PAYMENT_PROVIDER
        value: paystack
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: INTERNAL_API_SECRET
        generateValue: true
