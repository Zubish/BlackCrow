<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BlackCrow Escrow</title>
    <link rel="icon" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="brand-block auth-brand">
            <img src="images/logo.png" alt="BlackCrow Logo" class="brand-logo">
            <div>
                <h1>BlackCrow</h1>
                <p class="eyebrow">Join BlackCrow Escrow</p>
            </div>
        </div>
        <form class="auth-form" id="signup-form">
            <h2>Sign Up</h2>
            <div class="auth-form-grid">
                <div class="auth-form-panel">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-phone">Phone Number (Optional)</label>
                        <input type="tel" id="signup-phone" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm-password">Confirm Password</label>
                        <input type="password" id="signup-confirm-password" name="confirm-password" required>
                    </div>
                    <button class="primary-button" type="submit">Sign Up</button>
                </div>
                <div class="auth-divider-vertical"><span>or</span></div>
                <div class="auth-side-panel">
                    <div class="social-buttons">
                        <button type="button" class="social-button google">
                            <span class="social-icon google-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
                                    <path fill="#4285F4" d="M21.35 11.1h-9.7v2.95h5.55c-.24 1.2-.95 2.23-2.03 2.92v2.42h3.28c1.92-1.77 3.04-4.37 3.04-7.34 0-.64-.06-1.26-.14-1.84z"/>
                                    <path fill="#34A853" d="M11.65 22c2.75 0 5.06-.9 6.75-2.45l-3.28-2.42c-.9.6-2.05.95-3.47.95-2.66 0-4.92-1.8-5.73-4.2H2.5v2.63C4.19 19.8 7.66 22 11.65 22z"/>
                                    <path fill="#FBBC05" d="M5.92 13.88c-.2-.6-.32-1.24-.32-1.88s.12-1.28.32-1.88V7.5H2.5A9.93 9.93 0 0 0 1 12c0 1.6.38 3.1 1.05 4.5l3.27-2.62z"/>
                                    <path fill="#EA4335" d="M11.65 5.1c1.5 0 2.85.52 3.92 1.53l2.94-2.94C16.7 2.14 14.4 1 11.65 1 7.66 1 4.19 3.2 2.5 6.5l3.42 2.63c.81-2.4 3.07-4.2 5.73-4.2z"/>
                                </svg>
                            </span>
                            Sign Up with Google
                        </button>
                        <button type="button" class="social-button apple">
                            <span class="social-icon apple-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" role="img">
                                    <path fill="currentColor" d="M16.36 1.43c0 1.14-.42 2.14-1.25 3.01-1 1.02-2.2 1.61-3.51 1.52-.13-1.09.38-2.24 1.21-3.09.86-.89 2.21-1.56 3.55-1.44zM20.8 17.53c-.36.83-.54 1.21-1 1.94-.65 1.03-1.57 2.32-2.71 2.33-1.01.01-1.27-.67-2.64-.67-1.37.01-1.66.68-2.67.67-1.14-.01-2.01-1.17-2.66-2.2-1.82-2.88-2.01-6.25-.89-8.05.8-1.28 2.05-2.02 3.23-2.02 1.2 0 1.96.68 2.96.68.97 0 1.56-.68 2.96-.68 1.06 0 2.18.58 2.97 1.57-2.61 1.43-2.19 5.16.45 6.43z"/>
                                </svg>
                            </span>
                            Sign Up with Apple
                        </button>
                        <button type="button" class="social-button email">
                            <span class="social-icon email-icon" aria-hidden="true">@</span>
                            Sign Up with Email
                        </button>
                    </div>
                </div>
            </div>
            <p class="auth-link">Already have an account? <a href="login.html">Log In</a></p>
        </form>
    </div>
    <div class="toast" id="toast" aria-live="polite"></div>
    <script src="./script.js"></script>
</body>
</html>
