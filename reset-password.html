<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BlackCrow Escrow</title>
    <link rel="icon" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-page">
    <div class="auth-container auth-container-narrow">
        <div class="brand-block auth-brand">
            <img src="images/logo.png" alt="BlackCrow Logo" class="brand-logo">
            <div>
                <h1>BlackCrow</h1>
                <p class="eyebrow">Secure password reset</p>
            </div>
        </div>
        <form class="auth-form" id="reset-password-form">
            <h2>Reset Password</h2>
            <input type="hidden" id="reset-token" name="token">
            <div class="auth-form-panel">
                <div class="form-group">
                    <label for="reset-password">New password</label>
                    <div class="password-field">
                        <input type="password" id="reset-password" name="password" minlength="8" required>
                        <button class="password-toggle" type="button" aria-label="Show password" data-toggle-password="reset-password">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                                <circle cx="12" cy="12" r="2.6"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reset-confirm-password">Confirm new password</label>
                    <div class="password-field">
                        <input type="password" id="reset-confirm-password" name="confirm-password" minlength="8" required>
                        <button class="password-toggle" type="button" aria-label="Show password" data-toggle-password="reset-confirm-password">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                                <circle cx="12" cy="12" r="2.6"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="primary-button" type="submit">Update password</button>
            </div>
            <p class="auth-link"><a href="login.html">Back to login</a></p>
        </form>
    </div>
    <div class="toast" id="toast" aria-live="polite"></div>
    <script src="./script.js"></script>
</body>
</html>
