<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Escrow - Blackcrow Escrow</title>
    <link rel="icon" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="dashboard-page">
    <nav class="navbar">
        <div class="navbar-container">
            <div class="brand-block">
                <img src="images/logo.png" alt="BlackCrow Logo" class="brand-logo">
                <div>
                    <h1>BlackCrow</h1>
                </div>
            </div>
            <div class="nav-actions">
                <div class="wallet-pill" aria-label="Wallet balance">
                    <span class="wallet-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 7.5h14.5A2.5 2.5 0 0 1 21 10v7a2.5 2.5 0 0 1-2.5 2.5h-14A2.5 2.5 0 0 1 2 17V7.5A2.5 2.5 0 0 1 4.5 5H17"></path>
                            <path d="M17 13h4"></path>
                            <path d="M17.5 13.1v-.2"></path>
                        </svg>
                    </span>
                    <strong id="wallet-balance">₦--</strong>
                    <button class="wallet-toggle" id="wallet-toggle" type="button" aria-label="Show wallet balance"
                        aria-pressed="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                            <circle cx="12" cy="12" r="2.6"></circle>
                            <path class="eye-slash" d="M4 4l16 16"></path>
                        </svg>
                    </button>
                </div>
                <div class="profile-menu">
                    <button class="profile-trigger" id="profile-trigger" type="button" aria-label="Open profile menu"
                        aria-expanded="false" aria-controls="profile-menu">
                        <img src="images/profile_photo.jpg" alt="Profile" class="profile-img">
                    </button>
                    <div class="profile-menu-list" id="profile-menu" role="menu">
                        <a href="#" role="menuitem">Profile</a>
                        <a href="#" role="menuitem">Settings</a>
                        <a href="landingpage.html" role="menuitem">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-block">
                <div>
                    <p class="eyebrow">Control Center</p>
                </div>
            </div>

            <nav class="sidebar-nav" aria-label="Primary">
                <a class="nav-chip" href="overview.html">Overview</a>
                <a class="nav-chip" href="transactions.html">Transactions</a>
                <a class="nav-chip" href="wallet.html">Wallet</a>
                <a class="nav-chip is-active" href="create-escrow.html">Create Escrow</a>
                <a class="nav-chip" href="activity.html">Activity</a>
            </nav>

            <button class="sidebar-logout" type="button">Log out</button>
        </aside>

        <main class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Create Escrow</p>
                    <h2>Start from either side and share one clean link.</h2>
                </div>
            </header>

            <section class="composer-section" id="composer">
                <div class="section-heading">
                    <div>
                        <p class="section-kicker">Create escrow</p>
                        <h3>Create a shareable escrow link</h3>
                    </div>
                </div>

                <form class="composer-form" id="escrow-form">
                    <fieldset class="role-selector">
                        <legend>I am the</legend>
                        <label>
                            <input type="radio" name="initiatorRole" value="seller" checked>
                            <span>Seller</span>
                        </label>
                        <label>
                            <input type="radio" name="initiatorRole" value="buyer">
                            <span>Buyer</span>
                        </label>
                    </fieldset>

                    <div class="split-fields">
                        <label>
                            Your email
                            <input type="email" id="initiator-email" name="initiatorEmail" placeholder="you@email.com"
                                required>
                        </label>
                        <label>
                            Other party name
                            <input type="text" id="other-party" name="otherParty" placeholder="Kite Retail Group"
                                required>
                        </label>
                    </div>

                    <label>
                        Other party email
                        <input type="email" id="other-party-email" name="otherPartyEmail" placeholder="buyer@email.com"
                            required>
                    </label>

                    <label>
                        Amount
                        <input type="number" id="amount" name="amount" min="100" step="50" placeholder="8500" required>
                    </label>

                    <label>
                        What is being sold?
                        <input type="text" id="item-description" name="itemDescription" placeholder="iPhone 15 Pro, website project, wholesale order"
                            required>
                    </label>

                    <div class="split-fields">
                        <label>
                            Category
                            <select name="category">
                                <option value="General goods">General goods</option>
                                <option value="Phones and gadgets">Phones and gadgets</option>
                                <option value="Fashion order">Fashion order</option>
                                <option value="Wholesale goods">Wholesale goods</option>
                                <option value="Service or custom work">Service or custom work</option>
                            </select>
                        </label>
                        <label>
                            Condition
                            <select name="itemCondition">
                                <option value="New">New</option>
                                <option value="Used">Used</option>
                                <option value="Refurbished">Refurbished</option>
                                <option value="Custom order">Custom order</option>
                            </select>
                        </label>
                    </div>

                    <div class="split-fields">
                        <label>
                            Quantity
                            <input type="text" name="quantity" placeholder="1 item, 2 cartons, 10 yards">
                        </label>
                        <label>
                            Inspection window
                            <select name="inspectionDays">
                                <option value="1">24 hours</option>
                                <option value="2" selected>48 hours</option>
                                <option value="3">72 hours</option>
                            </select>
                        </label>
                    </div>

                    <div class="split-fields">
                        <label>
                            Delivery method
                            <select name="deliveryMethod">
                                <option value="Home delivery">Home delivery</option>
                                <option value="Pickup station">Pickup station</option>
                                <option value="Waybill or park delivery">Waybill or park delivery</option>
                                <option value="Digital delivery">Digital delivery</option>
                            </select>
                        </label>
                        <label>
                            Preferred courier
                            <input type="text" name="preferredCourier" placeholder="GIG, DHL, bus park, rider">
                        </label>
                    </div>

                    <label>
                        Who handles shipping?
                        <select name="shippingResponsibility">
                            <option value="Seller handles shipping">Seller handles shipping</option>
                            <option value="Buyer handles pickup">Buyer handles pickup</option>
                            <option value="Both parties agree outside BlackCrow">Both parties agree outside BlackCrow</option>
                        </select>
                    </label>

                    <label>
                        Release condition
                        <select id="release-condition" name="releaseCondition">
                            <option value="Delivery confirmation">Delivery confirmation</option>
                            <option value="Milestone approval">Milestone approval</option>
                            <option value="Document verification">Document verification</option>
                        </select>
                    </label>

                    <div class="form-actions">
                        <button class="primary-button" type="submit">Create escrow link</button>
                    </div>
                </form>

                <div class="escrow-link-panel" id="escrow-link-panel" hidden>
                    <span>Share this link with the other party</span>
                    <div class="escrow-link-row">
                        <input type="text" id="escrow-link" readonly>
                        <button class="action-button" id="copy-escrow-link" type="button">Copy</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="toast" id="toast" aria-live="polite"></div>
    <script src="./script.js"></script>
</body>

</html>
